name: CI - Readme validation

on: [pull_request]
jobs:
  readme-validation:
    # This Job confirms the validity and functionality of all functions presented in the README.md file
    name: Readme
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: openslides
          POSTGRES_PASSWORD: password
          POSTGRES_DB: openslides
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
        id: go

      - name: Check out code
        uses: actions/checkout@v6

      - name: create secrets
        run: |
          mkdir secrets
          printf "password" > secrets/postgres_password
          printf "my_token_key" > secrets/auth_token_key
          printf "my_cookie_key" > secrets/auth_cookie_key

      - name: create versions table
        env:
          PGPASSWORD: password
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U openslides -d openslides && break
            sleep 1
          done

          psql -h 127.0.0.1 -p 5432 -U openslides -d openslides <<'SQL'
          CREATE TABLE version (
              migration_index INTEGER PRIMARY KEY,
              migration_state TEXT,
              replace_tables JSONB
          );

          INSERT INTO version (migration_index, migration_state)
          VALUES (100, 'finalized')
          ON CONFLICT (id) DO UPDATE SET value = EXCLUDED.value;
          SQL

      - name: Start With golang
        run: |
          go build
          export DATABASE_PASSWORD_FILE=secrets/postgres_password
          export AUTH_TOKEN_KEY_FILE=secrets/auth_token_key
          export AUTH_COOKIE_KEY_FILE=secrets/auth_cookie_key
          timeout -k 10s --preserve-status --signal=SIGINT 2s ./openslides-autoupdate-service

      - name: Build Prod
        run: make build-prod

      - name: Start With Docker
        run: |
          timeout -k 30s --preserve-status --signal=SIGINT 5s docker run --network host -v $PWD/secrets:/run/secrets openslides-autoupdate
        env:
          DOCKER_BUILDKIT: 1
